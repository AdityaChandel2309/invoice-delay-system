version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: invoice_delay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/001_create_tables.sql:/docker-entrypoint-initdb.d/001_create_tables.sql:ro,Z
      - ./sql/002_seed_data.sql:/docker-entrypoint-initdb.d/002_seed_data.sql:ro,Z
      - ./sql/003_create_views.sql:/docker-entrypoint-initdb.d/003_create_views.sql:ro,Z
      - ./sql/004_create_indexes.sql:/docker-entrypoint-initdb.d/004_create_indexes.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/invoice_delay
      ML_MODELS_DIR: /app/ml_models
      DEBUG: "false"
    volumes:
      - ./ml_models:/app/ml_models:ro,Z
      - ./data:/app/data:ro,Z
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
